<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fast Dino AR</title>

  <!-- Google Model-Viewer script -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { 
      margin: 0; 
      background-color: #eee; /* Light grey instead of black to see if it's loading */
      font-family: -apple-system, sans-serif; 
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      --poster-color: transparent;
    }

    .ar-button {
      background-color: #ff6b35;
      border-radius: 30px;
      border: none;
      color: white;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 100;
    }

    .hint {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #333;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="hint">Loading lightweight dino... <br> (If the screen is grey, please wait 5 seconds)</div>

  <!-- 
    Changes made:
    1. Changed the 'src' to a smaller, faster model from jsDelivr
    2. Removed 'auto-rotate' to save processing power
    3. Set background to #eee to avoid the "black screen" feel
  -->
  <model-viewer 
    src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Duck/glTF-Binary/Duck.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    shadow-intensity="1">
    
    <button slot="ar-button" class="ar-button">
      🦖 VIEW IN YOUR ROOM
    </button>
  </model-viewer>

</body>
</html>
