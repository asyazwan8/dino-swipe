<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Dino AR</title>

  <!-- Use a newer version from unpkg (Google CDN version is old) -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; background-color: #f0f0f0; font-family: sans-serif; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #eee;
    }
    .ar-button {
      background-color: #ff6b35;
      border-radius: 30px;
      border: none;
      color: white;
      padding: 12px 24px;
      font-weight: bold;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <model-viewer
    src="https://modelviewer.dev/shared-assets/models/dinosaur.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/dinosaur.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    shadow-intensity="1"
    auto-rotate
    alt="A 3D dinosaur model">

    <button slot="ar-button" class="ar-button">
      🦖 VIEW IN YOUR ROOM
    </button>
  </model-viewer>
</body>
</html>
