<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Dino AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a2e; font-family: sans-serif; }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      gap: 12px;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hide overlay once loaded */
    .loaded .loading-overlay { display: none; }

    /* AR button */
    .ar-button {
      background: #ff6b35;
      border-radius: 30px;
      border: none;
      color: white;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 20px rgba(255,107,53,0.5);
      cursor: pointer;
      white-space: nowrap;
    }

    /* Hint text below button */
    .ar-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      white-space: nowrap;
    }

    /* Hide hint on non-AR devices */
    model-viewer:not([ar]) .ar-hint { display: none; }
  </style>
</head>
<body>
  <model-viewer
    id="dino-viewer"
    src="https://modelviewer.dev/shared-assets/models/dinosaur.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/dinosaur.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    shadow-intensity="1"
    auto-rotate
    alt="A 3D dinosaur in augmented reality">

    <!-- Loading spinner (hidden once model loads) -->
    <div class="loading-overlay" slot="progress-bar">
      <div class="spinner"></div>
      <span>Loading dinosaur...</span>
    </div>

    <button slot="ar-button" class="ar-button">
      🦖 VIEW IN YOUR ROOM
    </button>

    <p class="ar-hint">Requires Safari (iOS) or Chrome (Android)</p>

  </model-viewer>

  <script>
    const viewer = document.getElementById('dino-viewer');

    // Show confirmation when AR is actually launching
    viewer.addEventListener('ar-status', (e) => {
      console.log('AR status:', e.detail.status);
      if (e.detail.status === 'failed') {
        alert('AR not supported on this device/browser.\n\niOS: Use Safari\nAndroid: Use Chrome with ARCore');
      }
    });
  </script>
</body>
</html>
