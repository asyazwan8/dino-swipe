<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Dino Swipe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; user-select: none; }
    .hud { position: fixed; top: 0; left: 0; right: 0; padding: 12px; z-index: 10; pointer-events: none; }
    .bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5);
           border-radius: 14px; padding: 10px; color: #fff; backdrop-filter: blur(8px); }
    .stat { text-align: center; }
    .stat small { display: block; font-size: 11px; opacity: 0.7; letter-spacing: 1px; }
    .stat b { font-size: 22px; color: #ffb84d; }
    #combo { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
             font-size: 80px; font-weight: 900; color: #ffb84d; pointer-events: none;
             opacity: 0; z-index: 11; text-shadow: 0 0 20px #ffb84d; }
    #combo.pop { animation: pop 0.8s ease-out; }
    @keyframes pop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
      30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5) translateY(-50px); }
    }
    .overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #2b1810, #0a0606);
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               color: #fff; z-index: 100; text-align: center; padding: 20px; }
    .overlay h1 { font-size: 48px; margin: 0; background: linear-gradient(135deg,#ffb84d,#ff5e3a);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn { background: linear-gradient(135deg,#ff6b35,#f7931e); color: #fff; border: none;
           padding: 16px 40px; font-size: 18px; font-weight: 800; border-radius: 30px;
           margin-top: 24px; letter-spacing: 2px; }
  </style>
</head>
<body>

<div id="start" class="overlay">
  <h1>🦖 Dino Swipe</h1>
  <p>Move your phone to find dinosaurs.<br>Swipe to defeat them — chain hits for combos!</p>
  <button class="btn" onclick="startGame()">START</button>
</div>

<div id="end" class="overlay" style="display:none">
  <h1>Game Over!</h1>
  <p>Score: <span id="fs">0</span> · Best combo: <span id="bc">x1</span></p>
  <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div id="hud" class="hud" style="display:none">
  <div class="bar">
    <div class="stat"><small>SCORE</small><b id="score">0</b></div>
    <div class="stat"><small>TIME</small><b id="time">60</b></div>
    <div class="stat"><small>COMBO</small><b id="comboHud">x1</b></div>
  </div>
</div>

<div id="combo"></div>

<!-- The AR scene -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled:false">
  <a-entity camera></a-entity>
  <a-entity id="dinos"></a-entity>
  <a-entity id="particles"></a-entity>
  <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
  <a-light type="directional" position="1 5 1" intensity="0.6"></a-light>
</a-scene>

<script>
let score=0, combo=0, bestCombo=1, timeLeft=60, playing=false, dinos=[], audioCtx;

const colors = {
  trex:   { c:'#3a7d44', a:'#deb887' },
  raptor: { c:'#8b4513', a:'#ffd700' },
  stego:  { c:'#6b8e23', a:'#deb887' },
  ankylo: { c:'#556b2f', a:'#8b7355' },
};

function mkDino(type) {
  const e = document.createElement('a-entity');
  e.dataset.alive = 'true';
  e.dataset.type = type;
  const {c,a} = colors[type];
  const s = (t,w,h,d,m,r) => { const x=document.createElement('a-box');
    x.setAttribute('position',t); x.setAttribute('width',w); x.setAttribute('height',h); x.setAttribute('depth',d);
    if(r)x.setAttribute('rotation',r); x.setAttribute('material',`color:${m};roughness:0.8`); e.appendChild(x); };

  s('0 0.55 0',     0.65,0.55,1.1,  c);            // body
  s('0 0.6 -0.7',   0.18,0.18,0.55, c);            // tail
  s('0 0.95 0.55',  0.2,0.55,0.2,   c,'-30 0 0');  // neck
  s('0 1.2 0.75',   0.32,0.28,0.42, c);            // head
  s('0 1.1 0.85',   0.28,0.12,0.3,  a);            // jaw

  for(const x of [0.1,-0.1]) {
    const w=document.createElement('a-sphere'); w.setAttribute('position',`${x} 1.27 0.92`); w.setAttribute('radius','0.05'); w.setAttribute('material','color:#fff'); e.appendChild(w);
    const p=document.createElement('a-sphere'); p.setAttribute('position',`${x} 1.27 0.95`); p.setAttribute('radius','0.025'); p.setAttribute('material','color:#000'); e.appendChild(p);
  }
  for(const x of [0.22,-0.22]) for(const z of [0.38,-0.38]) s(`${x} 0.18 ${z}`, 0.14,0.35,0.14, c);

  if(type==='stego') for(let i=0;i<5;i++) {
    const sp=document.createElement('a-cone'); sp.setAttribute('position',`0 ${0.85+i*0.015} ${-0.4+i*0.2}`);
    sp.setAttribute('radius-bottom','0.07'); sp.setAttribute('radius-top','0'); sp.setAttribute('height','0.32');
    sp.setAttribute('material',`color:${a};roughness:0.8`); e.appendChild(sp);
  }
  return e;
}

function dist(p,a,b) {
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(!l2) return Math.hypot(p.x-a.x,p.y-a.y);
  let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/l2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}

function defeat(d) {
  d.dataset.alive='false';
  combo++; if(combo>bestCombo) bestCombo=combo;
  score += 10*Math.min(combo,5);
  document.getElementById('score').textContent=score;
  document.getElementById('comboHud').textContent='x'+Math.max(1,combo);
  if(combo>=2) {
    const c=document.getElementById('combo');
    c.textContent='x'+combo+'!'; c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');
  }
  d.querySelectorAll('a-box,a-sphere,a-cone').forEach(x=>{
    x.setAttribute('material','transparent:true;opacity:1');
    x.setAttribute('animation',{property:'material.opacity',from:1,to:0,dur:300});
  });
  d.setAttribute('animation',{property:'scale',to:'1.6 1.6 1.6',dur:250});
  setTimeout(()=>d.remove(),320);
  dinos=dinos.filter(x=>x!==d);
  if(navigator.vibrate) navigator.vibrate(30);
  beep();
  clearTimeout(window._comboT);
  window._comboT = setTimeout(()=>{ combo=0; document.getElementById('comboHud').textContent='x1'; },1500);
}

function beep() {
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.setValueAtTime(420,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.15);
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.2);
}

function spawn() {
  const types=Object.keys(colors);
  const d=mkDino(types[Math.random()*types.length|0]);
  // place ~2-3m in front of camera
  const cam=document.querySelector('[camera]');
  const camPos=cam.object3D.position;
  const angle=(Math.random()-0.5)*Math.PI*0.8;
  const dist=2+Math.random()*1.5;
  d.setAttribute('position',{x:Math.sin(angle)*dist,y:0,z:-Math.cos(angle)*dist});
  // face camera
  d.addEventListener('loaded',()=>d.object3D.lookAt(camPos));
  document.getElementById('dinos').appendChild(d);
  dinos.push(d);

  // auto-flee if not hit
  setTimeout(()=>{
    if(d.dataset.alive==='true') {
      const p=d.object3D.position;
      d.dataset.alive='fleeing';
      d.setAttribute('animation',{property:'position',to:`${p.x*2} 0 ${p.z*2}`,dur:1000});
      d.querySelectorAll('a-box,a-sphere,a-cone').forEach(x=>{
        x.setAttribute('material','transparent:true;opacity:1');
        x.setAttribute('animation',{property:'material.opacity',from:1,to:0,dur:1000});
      });
      setTimeout(()=>{d.remove(); dinos=dinos.filter(x=>x!==d);},1100);
    }
  },7000);
}

function startGame() {
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display='block';
  playing=true;

  // spawn loop
  let r=1500;
  (function loop(){ if(!playing) return; spawn(); r=Math.max(600,r*0.96); setTimeout(loop,r); })();

  // timer
  const ti=setInterval(()=>{
    timeLeft--; document.getElementById('time').textContent=timeLeft;
    if(timeLeft<=0){ clearInterval(ti); playing=false; document.getElementById('hud').style.display='none';
      document.getElementById('fs').textContent=score;
      document.getElementById('bc').textContent='x'+bestCombo;
      document.getElementById('end').style.display='flex'; }
  },1000);
}

// ---------- swipe detection ----------
let sS=null,sC=null;
function startSwipe(x,y){sS={x,y};sC={x,y};}
function moveSwipe(x,y){sC={x,y};}
function endSwipe(){
  if(!sS||!sC) return;
  if(Math.hypot(sC.x-sS.x,sC.y-sS.y)<30){sS=sC=null;return;}
  // hit-test each dino in 2D screen space
  const cam=document.querySelector('[camera]').object3D;
  const w=innerWidth,h=innerHeight;
  for(const d of [...dinos]){
    if(d.dataset.alive!=='true') continue;
    const v=d.object3D.position.clone().project(cam);
    if(v.z>1||v.z<-1) continue;
    const sp={x:(v.x*0.5+0.5)*w, y:(-v.y*0.5+0.5)*h};
    if(dist(sp,sS,sC)<90) defeat(d);
  }
  sS=sC=null;
}

document.addEventListener('touchstart',e=>{e.preventDefault();startSwipe(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchmove',e=>{e.preventDefault();moveSwipe(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',endSwipe);
document.addEventListener('mousedown',e=>startSwipe(e.clientX,e.clientY));
document.addEventListener('mousemove',e=>{if(sS)moveSwipe(e.clientX,e.clientY);});
document.addEventListener('mouseup',endSwipe);
</script>
</body>
</html>
